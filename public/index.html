// 2) FUNZIONE renderLiveScores() → VERSIONE AGGIORNATA
// Usa un iframe con risultati live reali da livescore API pubblica
// oppure mostra widget con link a Gazzetta risultati-live

function renderLiveScores() {
  const wrapper = document.getElementById('live-scores-wrapper');
  const c = document.getElementById('live-scores-container');
  if (!c) return;

  // Carica live scores via API pubblica (livescore-api.com free tier)
  // Oppure usa TheSportsDB (gratuito, no chiave)
  fetchLiveScores();
}

async function fetchLiveScores() {
  const c = document.getElementById('live-scores-container');
  if (!c) return;

  c.innerHTML = '<div class="score-loading" style="padding:8px 12px;">🔄 Caricamento risultati…</div>';

  try {
    // TheSportsDB - eventi live gratuiti (no API key per tier base)
    const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
    const url = `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&s=Soccer`;
    
    const res = await fetch(url);
    const data = await res.json();
    const events = data.events || [];

    if (!events.length) {
      c.innerHTML = renderFallbackScores();
      return;
    }

    // Filtra solo partite di oggi con score
    const liveOrRecent = events
      .filter(e => e.intHomeScore !== null || e.strStatus === 'Match Finished')
      .slice(0, 8);

    if (!liveOrRecent.length) {
      c.innerHTML = renderFallbackScores();
      return;
    }

    c.innerHTML = liveOrRecent.map(e => {
      const isLive = e.strStatus && !e.strStatus.includes('Finished') && !e.strStatus.includes('NS');
      const score = (e.intHomeScore !== null && e.intAwayScore !== null)
        ? `${e.intHomeScore}-${e.intAwayScore}`
        : 'vs';
      const time = e.strProgress || e.strStatus || e.strTime || '';

      return `<div class="score-card">
        <div class="sc-league">${e.strLeague || 'Calcio'}</div>
        <div class="sc-teams">${truncateTeam(e.strHomeTeam)} – ${truncateTeam(e.strAwayTeam)}</div>
        <div class="sc-score" style="${isLive?'color:#4ade80':''}">${score}</div>
        <div class="sc-time">${time}</div>
      </div>`;
    }).join('');

  } catch (e) {
    // Fallback: link diretto a Gazzetta live
    c.innerHTML = renderFallbackScores();
  }
}

function truncateTeam(name) {
  if (!name) return '?';
  return name.length > 12 ? name.slice(0, 11) + '…' : name;
}

function renderFallbackScores() {
  // Quando non ci sono partite live o API non disponibile
  return `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;flex-wrap:wrap;">
      <div class="score-card" style="min-width:auto;padding:.4rem .8rem;cursor:pointer;" 
           onclick="window.open('https://www.gazzetta.it/risultati-live/','_blank')">
        <div class="sc-league">Serie A</div>
        <div class="sc-teams">Risultati Live</div>
        <div class="sc-score">📊 →</div>
        <div class="sc-time">Gazzetta.it</div>
      </div>
      <div class="score-card" style="min-width:auto;padding:.4rem .8rem;cursor:pointer;"
           onclick="window.open('https://www.corrieredellosport.it/calcio/serie-a/','_blank')">
        <div class="sc-league">Serie B</div>
        <div class="sc-teams">Classifiche</div>
        <div class="sc-score">📋 →</div>
        <div class="sc-time">CdS</div>
      </div>
      <a href="https://www.gazzetta.it/risultati-live/" target="_blank" rel="noopener"
         style="font-family:var(--sans);font-size:11px;color:rgba(255,255,255,.6);
                text-decoration:none;padding:6px 12px;border:1px solid rgba(255,255,255,.2);
                border-radius:4px;white-space:nowrap;">
        🔴 Vedi tutti i risultati live →
      </a>
    </div>`;
}

// 3) FUNZIONE getSportArticles() → VERSIONE AGGIORNATA
// Riconosce i nuovi source_label del server aggiornato

function getSportArticles() {
  const SPORT_SOURCE_LABELS = [
    'Gazzetta.it', 'Corriere dello Sport', 'Sky Sport', 'Tuttosport', 'PalermoToday.it'
  ];
  return allArticles.filter(a =>
    SPORT_CATS.includes(a.cat) ||
    SPORT_SOURCE_LABELS.includes(a.source_label)
  );
}

// 4) FUNZIONE filterSportNews() → VERSIONE AGGIORNATA
// Aggiornata per i nuovi filtri tab

function filterSportNews(filter, btn) {
  currentSportFilter = filter;
  document.querySelectorAll('.sport-tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderSportGrid(filter);
}

// 5) FUNZIONE renderSportGrid() → VERSIONE AGGIORNATA

function renderSportGrid(filter) {
  const grid = document.getElementById('sport-grid');
  let list = getSportArticles();

  if (filter === 'Gazzetta.it') {
    list = list.filter(a => a.source_label === 'Gazzetta.it');
  } else if (filter === 'Corriere dello Sport') {
    list = list.filter(a => a.source_label === 'Corriere dello Sport');
  } else if (filter === 'Sky Sport') {
    list = list.filter(a => a.source_label === 'Sky Sport');
  } else if (filter === 'Tuttosport') {
    list = list.filter(a => a.source_label === 'Tuttosport');
  } else if (filter !== 'all') {
    list = list.filter(a => a.cat === filter);
  }

  grid.innerHTML = list.length
    ? list.map(a => cardHTML(a, true)).join('')
    : '<div class="empty-state">Nessuna notizia sportiva per questa categoria.</div>';
}
